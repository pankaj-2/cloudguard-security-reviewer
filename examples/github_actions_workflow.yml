name: CI/CD Pipeline

# ── CRITICAL: pull_request_target with untrusted code checkout (injection risk) ──
on:
  push:
    branches: [main, develop]
  pull_request_target:              # HIGH: runs with secrets on untrusted PRs
    types: [opened, synchronize]

# ── HIGH: write-all at workflow level — overly broad permissions ──────────────
permissions: write-all

env:
  ACTIONS_RUNNER_DEBUG: true        # MEDIUM: Debug info exposure in logs
  ACTIONS_STEP_DEBUG: true          # MEDIUM: Step-level debug output

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    # No timeout-minutes set         MEDIUM: No timeout — resource/cost risk

    steps:
      # HIGH: Pinned to tag, not SHA — tag can be moved (supply-chain risk)
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          # CRITICAL: Checks out PR's HEAD from untrusted fork
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@v3   # MEDIUM: Not SHA-pinned
        with:
          node-version: "18"

      # ── CRITICAL: Secret printed directly in logs ──────────────────────────
      - name: Debug API credentials
        run: |
          echo "Debugging: API_KEY=${{ secrets.API_KEY }}"
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
          echo "STRIPE_SECRET=${{ secrets.STRIPE_SECRET }}"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          API_KEY: ${{ secrets.API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # ── HIGH: Outdated action, not SHA-pinned ──────────────────────────────
      - name: Upload coverage
        uses: codecov/codecov-action@v1   # Outdated, no SHA pin

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    # No timeout-minutes             MEDIUM: Unbounded build time
    needs: build

    steps:
      - uses: actions/checkout@v2    # HIGH: Pinned to tag only (again)

      # ── MEDIUM: Docker credentials in env vars during build ────────────────
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t myapp:latest .

      # ── HIGH: Pushing mutable :latest tag ─────────────────────────────────
      - name: Push image
        run: docker push myapp:latest

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    # No timeout-minutes             MEDIUM: No deployment timeout
    environment: production

    steps:
      - uses: actions/checkout@v2

      # ── HIGH: kubeconfig written to disk without cleanup ──────────────────
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ./kubeconfig
          export KUBECONFIG=./kubeconfig

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/
          kubectl rollout status deployment/app

      # ── MEDIUM: No cleanup of sensitive files after deploy ─────────────────
      # kubeconfig file left on disk
